spring.application.name=radar
# Configuración de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/radar_bd
spring.datasource.username=postgres
spring.datasource.password=admin123

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# SERVER
# =========================

server.servlet.context-path=/api/v1

# =========================
# JWT
# =========================

application.jwt.secret-key=supersecretkeythatshouldbelongandcomplexsupersecretkeythatshouldbelongandcomplex
application.jwt.token-prefix=Bearer
application.jwt.token-expiration-after-days=7
application.jwt.refresh-token-expiration-after-days=30